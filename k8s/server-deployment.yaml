apiVersion: apps/v1
kind: Deployment
metadata:
  name: anydesk-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anydesk-server
  template:
    metadata:
      labels:
        app: anydesk-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3001"
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: server
        image: ghcr.io/gaurravvvv/anydesk-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: CORS_ORIGINS
          value: "*"
        - name: REDIS_URL
          value: "redis://anydesk-redis-service:6379"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
