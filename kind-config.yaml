kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  # Map host port 8080 to NodePort 30080 for Viewer
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  # Map host port 3001 to NodePort 30081 for Server
  - containerPort: 30081
    hostPort: 3001
    protocol: TCP
